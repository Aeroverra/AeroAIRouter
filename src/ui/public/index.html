<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>AeroAIRouter — Control Panel</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <div id="loading" class="center">Loading…</div>
  </div>

  <!-- Login view -->
  <template id="tpl-login">
    <div class="center">
      <form class="card auth-card" data-form="login">
        <h1>AeroAIRouter</h1>
        <p class="muted">Enter your admin password to continue.</p>
        <input type="password" name="password" placeholder="Password" autocomplete="current-password" required />
        <button type="submit">Log in</button>
        <p class="err" data-err></p>
      </form>
    </div>
  </template>

  <!-- Setup wizard — multi-step (first-run AND re-run from the dashboard) -->
  <template id="tpl-setup">
    <div class="center">
      <div class="card wizard">
        <div class="wiz-head">
          <h1 data-setup-title>Set up AeroAIRouter</h1>
          <div class="wiz-progress" data-progress></div>
        </div>
        <div class="wiz-body" data-body></div>
        <p class="err" data-err></p>
        <div class="wiz-nav">
          <button type="button" class="ghost" data-back hidden>← Back</button>
          <span class="spacer"></span>
          <button type="button" class="ghost" data-cancel hidden>Cancel</button>
          <button type="button" data-next>Next →</button>
          <button type="button" data-finish hidden>Finish</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Dashboard -->
  <template id="tpl-dash">
    <header class="topbar">
      <div class="brand">AeroAIRouter</div>
      <div class="topbar-right">
        <span class="bot-status" data-bot-status>bot: …</span>
        <button class="ghost" data-action="restart">Restart bot</button>
        <label class="switch"><input type="checkbox" data-advanced /> Advanced</label>
        <button class="ghost" data-action="rerun-setup">Setup wizard</button>
        <button class="ghost" data-action="password">Password</button>
        <button class="ghost" data-action="logout">Log out</button>
      </div>
    </header>
    <div class="layout">
      <nav class="sidebar" data-nav></nav>
      <main class="content" data-content></main>
    </div>
    <div class="savebar" data-savebar hidden>
      <span data-savemsg>Unsaved changes</span>
      <button data-action="save">Save changes</button>
    </div>
  </template>
</body>
<script src="/app.js"></script>
</html>
